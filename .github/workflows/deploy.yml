name: Build & Push to Azure Container Registry

on:
  push:
    branches: [main]

env:
  ACR_NAME: portalzamowienacr
  IMAGE_NAME: portalzamowien

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name $ACR_NAME

      - name: Build Docker image
        run: |
          docker build \
            -t $ACR_NAME.azurecr.io/$IMAGE_NAME:latest \
            -t $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} \
            .

      - name: Push to ACR
        run: |
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:latest
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}
